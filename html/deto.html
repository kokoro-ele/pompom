<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>🍮🍮🍮🍮</title>
    <meta name="description" content="">
    <link rel="stylesheet" href="document.css">
    <link rel="apple-touch-icon" href="pompom.png">
    <style>
        @media (max-width:800px) {
            .deto{
                transform: scale(0.6);
                transform-origin: 50% 100%;
                margin: 0 -100px;
            }
            html .deto>div{
                margin: 0 -120px;
            }
        }
    </style>
</head>
<body>
    <div class="deto">
        <div class="cinnamon"></div>
        <div class="pompom"></div>
    </div>
    <div class="ctrl-box">
        <a class="set-orientation-link" onclick="setOrientationListener()" data-locale="gyroscope">陀螺仪</a>
        <a href="./" data-locale="home">首页</a>
    </div>
    <script src="sakana.min.js"></script>
    <script>
        const params = new Proxy(new URLSearchParams(window.location.search), {
            get: (searchParams, prop) => searchParams.get(prop),
            set: (searchParams, prop, value) => {
                searchParams.set(prop, value);
                window.history.replaceState(null, null, `?${searchParams.toString()}`);
                return true;
            }
        });

        // 尝试修复部分手机浏览器高度异常的问题
        document.body.style.minHeight = `${window.innerHeight}px`;
        
        const htmlEl = document.documentElement;

        // 透明背景
        if(params.alpha){
            htmlEl.setAttribute('data-alpha',params.alpha);
        }

        // 自定义背景色
        if(params.background){
            htmlEl.setAttribute('data-alpha',true);
            htmlEl.style.background = params.background;
        }

        const pompom = Sakana.init({
            el: '.pompom',
            character: 'pompom',
            inertia: 0.001,
            decay: 1
        });

        const cinnamon = Sakana.init({
            el: '.cinnamon',
            character: 'cinnamon',
            inertia: 0.01,
            decay: 1,
        });
    </script>
    <script src="locale.js"></script>
</body>
</html>
